version: "3.8"
services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: biometria_frontend
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - biometria-network
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 16M
  db:
    image: pgvector/pgvector:pg16
    container_name: biometria_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-biometria}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-biometria_secret}
      POSTGRES_DB: ${POSTGRES_DB:-biometria_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-biometria} -d ${POSTGRES_DB:-biometria_db}
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - biometria-network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: biometria_api
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-biometria}:${POSTGRES_PASSWORD:-biometria_secret}@db:5432/${POSTGRES_DB:-biometria_db}
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://asistencia.sistemaslab.dev}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - biometria-network
      - dokploy-network
      - default
    deploy:
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 256M
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      - "traefik.http.routers.sistemabiometrico-biometriacompose-roqjq8-12-web.rule=Host(`asistencia.sistemaslab.dev`) && PathPrefix(`/api`)"
      - traefik.http.routers.sistemabiometrico-biometriacompose-roqjq8-12-web.entrypoints=web
      - traefik.http.routers.sistemabiometrico-biometriacompose-roqjq8-12-web.middlewares=redirect-to-https@file
      - traefik.http.routers.sistemabiometrico-biometriacompose-roqjq8-12-web.service=sistemabiometrico-biometriacompose-roqjq8-12-web
      - traefik.http.services.sistemabiometrico-biometriacompose-roqjq8-12-web.loadbalancer.server.port=8000
      - "traefik.http.routers.sistemabiometrico-biometriacompose-roqjq8-12-websecure.rule=Host(`asistencia.sistemaslab.dev`) && PathPrefix(`/api`)"
      - traefik.http.routers.sistemabiometrico-biometriacompose-roqjq8-12-websecure.entrypoints=websecure
      - traefik.http.routers.sistemabiometrico-biometriacompose-roqjq8-12-websecure.service=sistemabiometrico-biometriacompose-roqjq8-12-websecure
      - traefik.http.services.sistemabiometrico-biometriacompose-roqjq8-12-websecure.loadbalancer.server.port=8000
      - traefik.http.routers.sistemabiometrico-biometriacompose-roqjq8-12-websecure.tls.certresolver=letsencrypt
networks:
  biometria-network:
    driver: bridge
  dokploy-network:
    external: true
volumes:
  postgres_data: null
