version: "3.8"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: biometria_frontend
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - biometria-network

  db:
    image: pgvector/pgvector:pg16
    container_name: biometria_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-biometria}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-biometria_secret}
      POSTGRES_DB: ${POSTGRES_DB:-biometria_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-biometria} -d ${POSTGRES_DB:-biometria_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - biometria-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: biometria_api
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-biometria}:${POSTGRES_PASSWORD:-biometria_secret}@db:5432/${POSTGRES_DB:-biometria_db}
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://biometria.sistemaslab.dev}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped
    networks:
      - biometria-network

networks:
  biometria-network:
    driver: bridge

volumes:
  postgres_data:
